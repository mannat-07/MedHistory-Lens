version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: medhistory_postgres
    environment:
      POSTGRES_USER: medhistory
      POSTGRES_PASSWORD: password
      POSTGRES_DB: medhistory_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medhistory_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medhistory"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medhistory_redis
    ports:
      - "6379:6379"
    networks:
      - medhistory_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  medhistory_network:
    driver: bridge
